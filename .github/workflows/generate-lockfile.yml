name: Generate root lockfile

on:
  push:
    branches:
      - codex/migrate-middleware-to-proxy-in-apps/web-kc1fkd

permissions:
  contents: write

jobs:
  generate-lockfile:
    if: "!contains(github.event.head_commit.message, '[skip-lock]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate root package-lock.json
        run: npm install --package-lock-only

      - name: Commit root lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- package-lock.json; then
            echo "No lockfile changes"
          else
            git add package-lock.json
            git commit -m "chore(repo): add root package-lock [skip-lock]"
            git push
          fi
